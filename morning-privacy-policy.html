<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Privacy Policy — Open When: Verses</title>
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Privacy Policy for Open When: Verses." />
    <link rel="icon" href="cell1.svg?v=6" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="cell.png?v=6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --text: #1a1a1a;
        --muted: #5f6368;
        --border: rgba(0, 0, 0, 0.10);
        --surface: rgba(0, 0, 0, 0.03);
        --radius: 18px;
        --container: 920px;
        --headerH: 76px;
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
      }

      body {
        margin: 0;
        font-family: "Quicksand", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background:
          radial-gradient(900px 420px at 82% 0%, rgba(0, 194, 255, 0.12), transparent 60%),
          radial-gradient(900px 420px at 12% 10%, rgba(255, 91, 91, 0.10), transparent 55%),
          linear-gradient(180deg, #ffffff, #ffffff);
      }

      .container {
        width: min(var(--container), 100%);
        margin: 0 auto;
        padding: 0 20px;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
      }

      .nav {
        height: var(--headerH);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
      }

      .brandIcon {
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        overflow: hidden;
      }
      .brandIcon img { width: 100%; height: 100%; object-fit: contain; display: block; }

      .brandName { font-weight: 700; font-size: 18px; line-height: 1.1; }
      .brandRole { font-size: 13px; color: var(--muted); margin-top: 2px; }

      .backLink {
        font-weight: 600;
        text-decoration: none;
        color: rgba(0, 0, 0, 0.72);
        padding: 10px 12px;
        border-radius: 12px;
        transition: background 140ms ease, color 140ms ease;
      }
      .backLink:hover { background: rgba(0, 0, 0, 0.05); color: rgba(0, 0, 0, 0.92); }

      main { padding: 40px 0 56px; }

      .paper {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
      }

      h2 {
        margin: 26px 0 10px;
        font-size: 20px;
        letter-spacing: -0.01em;
      }

      p {
        margin: 10px 0 0;
        color: rgba(0, 0, 0, 0.72);
        line-height: 1.75;
        font-size: 16px;
      }

      ul {
        margin: 10px 0 0;
        padding-left: 18px;
        color: rgba(0, 0, 0, 0.72);
        line-height: 1.75;
        font-size: 16px;
      }

      li { margin: 6px 0; }

      .callout {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(0, 0, 0, 0.10);
        background: rgba(0, 0, 0, 0.02);
        color: rgba(0, 0, 0, 0.70);
      }

      a { color: inherit; }

      @media (max-width: 880px) {
        .brandIcon { width: 44px; height: 44px; }
        .brandName { font-size: 20px; }
        .brandRole { font-size: 14px; }
        .backLink { padding: 10px 10px; }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="container">
        <div class="nav">
          <a class="brand" href="index.html" aria-label="Back to portfolio home">
            <span class="brandIcon" aria-hidden="true">
              <img src="eu2.png" alt="" />
            </span>
            <span>
              <div class="brandName">Open When: Verses</div>
              <div class="brandRole">Privacy Policy</div>
            </span>
          </a>

          <a class="backLink" href="index.html">Back to portfolio</a>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <article class="paper">
          <h1>Privacy Policy — Open When: Verses</h1>
          <div class="meta">Effective date: 29 January 2026</div>

          <p>
            Privacy content is in construction. Please check back soon.
          </p>
          <h2>Contact</h2>
          <div class="callout">
            <div><strong>Vanessa Lucena</strong></div>
            <div>Email: <a href="mailto:vanluhurla@gmail.com">vanluhurla@gmail.com</a></div>
            <div>Website: <a href="https://vanluhurla.com">vanluhurla.com</a></div>
          </div>
        </article>
      </div>
    </main>
  </body>
</html>
